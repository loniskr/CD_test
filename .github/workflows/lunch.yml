name: Lunch Bot

on:
  schedule:
    - cron: "0 2 * * 1-5"   # 평일 오전 11시(KST)
  workflow_dispatch:

permissions:
  contents: write           # 저장소에 커밋하려면 필요

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests beautifulsoup4

      - name: 점심 메뉴 알림
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python lunch-bot/lunch_bot.py

      - name: 이미지·캐시 커밋
        run: |
          git config user.name "lunch-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data images
          git diff --staged --quiet || git commit -m "lunch: ${{ github.run_id }}"
          git push