name: Deploy to EC2
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'images/**'
      - 'data/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 EC2 배포
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_PPK }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd /var/www/mysite
            git pull origin main
            sudo nginx -t
            sudo systemctl reload nginx
          EOF

      - name: Teams 알림 (성공)
        if: success()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  { "type": "TextBlock", "text": "✅ 배포 성공", "weight": "Bolder", "size": "Medium" },
                  { "type": "TextBlock", "text": "EC2에 정상 배포되었습니다.", "wrap": true }
                ]
              }
            }]
          }' "${{ secrets.TEAMS_WEBHOOK }}"

      - name: Teams 알림 (실패)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  { "type": "TextBlock", "text": "❌ 배포 실패", "weight": "Bolder", "size": "Medium", "color": "Attention" },
                  { "type": "TextBlock", "text": "배포 중 오류가 발생했습니다.", "wrap": true }
                ]
              }
            }]
          }' "${{ secrets.TEAMS_WEBHOOK }}"