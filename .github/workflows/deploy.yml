name: Deploy to EC2
on:
  push:
    branches: [ main ]      
  workflow_dispatch:         
# main에 push될 때만 배포
# 수동 실행 버튼(테스트용)
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/mysite
            git pull origin main
            sudo nginx -t
            sudo systemctl reload nginx

      - name: Teams 알림 (성공)
        if: success()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  { "type": "TextBlock", "text": "✅ 배포 성공", "weight": "Bolder", "size": "Medium" },
                  { "type": "TextBlock", "text": "EC2에 정상 배포되었습니다.", "wrap": true }
                ]
              }
            }]
          }' ${{ secrets.TEAMS_WEBHOOK }}

      - name: Teams 알림 (실패)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  { "type": "TextBlock", "text": "❌ 배포 실패", "weight": "Bolder", "size": "Medium", "color": "Attention" },
                  { "type": "TextBlock", "text": "배포 중 오류가 발생했습니다. 로그를 확인하세요.", "wrap": true }
                ]
              }
            }]
          }' ${{ secrets.TEAMS_WEBHOOK }}