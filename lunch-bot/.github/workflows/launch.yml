name: Lunch Bot

on:
  schedule:
    - cron: "* * * * *"   # 매시간 정각 (UTC 기준)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests beautifulsoup4

      - name: 점심 메뉴 알림
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
        run: python lunch_bot.py